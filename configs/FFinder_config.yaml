# Configuration file for FFinder model training

# Model parameters
model:
  num_classes: 2

# Training parameters
training:
  # Random Forest parameters
  n_estimators: 500
  max_depth: 6
  random_state: 723
  n_jobs: -1
  
  # Grid search parameters
  grid_search:
    enabled: false  # Set to true to enable grid search
    cv: 5 
    scoring: "balanced_accuracy"
    param_grid:
      n_estimators: [50, 100, 150, 200, 250, 300]
      max_depth: [10, 20, 30, 40, 50]
      min_samples_leaf: [1, 2, 4, 6, 8, 10]

# Data paths
data:
  ffinder_train_val_h5_paths: [./hdf5_features/FFinder_feature_train_val.h5]  # HDF5 file containing train and val groups
  ffinder_joint_h5_paths: [./hdf5_features_joint/FFinder_feature_train_val.h5]  # HDF5 file containing train and val groups
  ffinder_tuning_h5_paths: [./hdf5_features_real_15330/FFinder_feature_train_val.h5]

# Model saving
model_saving:
  save_dir: "models/FFinder"
  filename: "FFinder_model.joblib"
  save_model: true  # Save trained model (best hyperparameters if grid search enabled, otherwise fixed hyperparameters)
  joint_filename: "FFinder_model_joint.joblib"
  tuning_filename: "FFinder_model_tuning.joblib"
