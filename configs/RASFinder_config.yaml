# Configuration file for RASFinder model training

# Model parameters
model:
  input_dim: 23
  summary_dim: 10
  num_classes: 4  # None, +G, +I, +G+I
  num_heads: 2
  num_layers: 4
  dim_model: 138
  dim_feedforward: 299

# Training parameters
training:
  learning_rate: 0.001
  learning_rate_joint: 0.0005
  learning_rate_tuning: 0.0001
  weight_decay: 0.0001
  batch_size: 16
  gradient_clip_val: 1.0
  pin_memory: true  # True for CUDA, False for MPS

# Learning rate scheduler
lr_scheduler:
  patience: 5
  threshold: 0.0002
  factor: 0.1
  mode: "max"

# Early stopping
early_stopping:
  monitor: "val_acc"
  mode: "max"
  patience: 10
  min_delta: 0.0002

# Data paths
data:
  train_val_h5_paths: [./hdf5_features/RASFinder_feature_train_val.h5]
  joint_h5_paths: [./hdf5_features_joint/RASFinder_feature_train_val.h5]
  real_h5_paths: [./hdf5_features_real_15330/RASFinder_feature_train_val.h5]

# Training settings
trainer:
  accelerator: "auto"
  devices: "auto"
  precision: "16-mixed"
  gradient_clip_val: null
  max_seq_len: 3000
  max_epochs: 30
  max_epochs_joint: 20
  max_epochs_tuning: 10
  accumulate_grad_batches: 8
  check_val_every_n_epoch: 1
  log_every_n_steps: 50

# Checkpointing
checkpoint:
  save_top_k: 1
  monitor: "val_acc"
  mode: "max"
  filename: "RASFinder-{epoch:02d}-{val_acc:.4f}"
  save_last: true
  every_n_epochs: 5

# Logging
logging:
  logger: "tensorboard"
  log_dir: "lightning_logs"
  name: "RASFinder"

